<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLHA Price Tracker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="shell">
      <header class="app-header">
        <div class="header-copy">
          <p class="eyebrow" id="header-byline"></p>
          <h1 id="header-title"></h1>
          <p class="header-subtitle" id="header-subtitle"></p>
        </div>
        <div class="header-actions">
          <span class="badge" id="header-badge"></span>
          <button class="button button-theme" id="theme-button" type="button" title="Toggle theme"></button>
          <button class="button button-ghost button-small" id="open-options-button" type="button"></button>
          <button class="button button-donate button-small" id="donate-button" type="button"></button>
        </div>
      </header>

      <section class="summary-grid" id="summary-grid"></section>

      <section class="panel" id="onboarding-panel" hidden></section>
      <section class="panel" id="guide-panel"></section>

      <section class="panel panel-accent">
        <div class="panel-heading">
          <div>
            <h2 id="current-page-title"></h2>
            <p id="current-page-subtitle"></p>
          </div>
        </div>
        <div id="current-page-content"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <div>
            <h2 id="tracked-listings-title"></h2>
            <p id="tracked-listings-subtitle"></p>
          </div>
        </div>
        <div id="tracked-list" class="tracked-list"></div>
      </section>

      <footer class="footer">
        <p id="footer-copy"></p>
      </footer>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script src="utils.js"></script>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
